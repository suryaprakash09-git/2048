<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');

        :root {
            --bg-color: #faf8ef;
            --text-color: #776e65;
            --board-bg: #bbada0;
            --cell-bg: rgba(238, 228, 218, 0.35);
            --tile-color: #f9f6f2;
            --btn-bg: #8f7a66;
            --btn-hover: #9f8b77;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: lavender;
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 480px;
            max-width: 95vw;
            margin: 0 auto;
            padding: 20px 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 4rem);
            font-weight: 800;
            color: #776e65;
            margin: 0;
            line-height: 1;
        }

        .scores-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: var(--board-bg);
            padding: 8px 15px;
            border-radius: 6px;
            text-align: center;
            color: white;
            min-width: 70px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .score-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #eee4da;
            margin-bottom: 3px;
            letter-spacing: 0.5px;
        }

        .score-value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .game-intro {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .game-intro p {
            font-size: 1rem;
            line-height: 1.4;
        }

        .play-btn {
            background: var(--btn-bg);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            white-space: nowrap;
        }

        .play-btn:hover {
            background: var(--btn-hover);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .game-board-container {
            position: relative;
            background: var(--board-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            width: 100%;
            aspect-ratio: 1 / 1;
            touch-action: none;
            /* Prevent scroll on touch devices while playing */
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            background: var(--cell-bg);
            border-radius: 6px;
            width: 100%;
            height: 100%;
        }

        .tile-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            border-radius: 6px;
            transition: transform 150ms ease-in-out, opacity 100ms ease-in-out;
            transform-origin: center;
            z-index: 10;
        }

        .tile-inner {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            animation: appear 200ms ease-in-out;
        }

        .tile.merged .tile-inner {
            animation: pop 200ms ease-in-out;
            z-index: 20;
        }

        @keyframes appear {
            0% {
                opacity: 0;
                transform: scale(0);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Tile Colors */
        .tile-2 .tile-inner {
            background: #eee4da;
            color: #776e65;
            font-size: 3rem;
        }

        .tile-4 .tile-inner {
            background: #ede0c8;
            color: #776e65;
            font-size: 3rem;
        }

        .tile-8 .tile-inner {
            background: #f2b179;
            color: #f9f6f2;
            font-size: 3rem;
        }

        .tile-16 .tile-inner {
            background: #f59563;
            color: #f9f6f2;
            font-size: 2.6rem;
        }

        .tile-32 .tile-inner {
            background: #f67c5f;
            color: #f9f6f2;
            font-size: 2.6rem;
        }

        .tile-64 .tile-inner {
            background: #f65e3b;
            color: #f9f6f2;
            font-size: 2.6rem;
        }

        .tile-128 .tile-inner {
            background: #edcf72;
            color: #f9f6f2;
            font-size: 2.2rem;
            box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.14);
        }

        .tile-256 .tile-inner {
            background: #edcc61;
            color: #f9f6f2;
            font-size: 2.2rem;
            box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.19);
        }

        .tile-512 .tile-inner {
            background: #edc850;
            color: #f9f6f2;
            font-size: 2.2rem;
            box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.24);
        }

        .tile-1024 .tile-inner {
            background: #edc53f;
            color: #f9f6f2;
            font-size: 1.8rem;
            box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.28);
        }

        .tile-2048 .tile-inner {
            background: #edc22e;
            color: #f9f6f2;
            font-size: 1.8rem;
            box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.33);
        }

        .tile-super .tile-inner {
            background: #3c3a32;
            color: #f9f6f2;
            font-size: 1.8rem;
        }

        .game-message {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.85);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .game-message.active {
            opacity: 1;
            pointer-events: auto;
        }

        .game-message p {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--text-color);
            text-align: center;
        }

        .game-message.game-won p {
            color: #f9f6f2;
        }

        .game-message.game-won {
            background: rgba(237, 194, 46, 0.7);
        }

        .instructions {
            margin-top: 40px;
            color: #776e65;
            line-height: 1.6;
        }

        .instructions strong {
            font-weight: 700;
        }

        @media screen and (max-width: 500px) {
            .game-board-container {
                padding: 10px;
            }

            .grid-container {
                gap: 10px;
            }

            .tile-container {
                top: 10px;
                left: 10px;
                right: 10px;
                bottom: 10px;
            }

            .tile-2 .tile-inner,
            .tile-4 .tile-inner,
            .tile-8 .tile-inner {
                font-size: 2.2rem;
            }

            .tile-16 .tile-inner,
            .tile-32 .tile-inner,
            .tile-64 .tile-inner {
                font-size: 1.8rem;
            }

            .tile-128 .tile-inner,
            .tile-256 .tile-inner,
            .tile-512 .tile-inner {
                font-size: 1.5rem;
            }

            .tile-1024 .tile-inner,
            .tile-2048 .tile-inner {
                font-size: 1.2rem;
            }

            .game-message p {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>2048</h1>
            <div class="scores-container">
                <div class="score-box">
                    <div class="score-title">Score</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-title">Best</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
        </div>

        <div class="game-intro">
            <p>Join the numbers and get to the <strong>2048 tile!</strong></p>
            <button class="play-btn" id="new-game-btn">New Game</button>
        </div>

        <div class="game-board-container" id="game-container">
            <div class="grid-container" id="grid">
                <!-- 16 cells -->
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>
            <div class="tile-container" id="tile-container"></div>

            <div class="game-message" id="game-message">
                <p id="game-message-text">Game Over!</p>
                <div class="lower">
                    <button class="play-btn" id="retry-btn">Try again</button>
                </div>
            </div>
        </div>

        <div class="instructions">
            <p><strong>HOW TO PLAY:</strong> Use your <strong>arrow keys</strong> or <strong>swipe</strong> to move the
                tiles. Tiles with the same number merge into one when they touch. Add them up to reach
                <strong>2048!</strong>
            </p>
        </div>
    </div>

    <script>
        class GameManager {
            constructor() {
                this.size = 4;
                this.grid = [];
                this.score = 0;
                this.bestScore = localStorage.getItem('bestScore2048') || 0;
                this.won = false;
                this.over = false;
                this.tiles = {};
                this.tileId = 0;
                this.isAnimating = false;
                this.keepPlaying = false;

                this.tileContainer = document.getElementById('tile-container');
                this.scoreEl = document.getElementById('score');
                this.bestScoreEl = document.getElementById('best-score');
                this.messageEl = document.getElementById('game-message');
                this.messageTextEl = document.getElementById('game-message-text');
                this.retryBtn = document.getElementById('retry-btn');

                document.getElementById('new-game-btn').addEventListener('click', () => this.restart());

                this.retryBtn.addEventListener('click', () => {
                    if (this.won && !this.keepPlaying) {
                        this.messageEl.classList.remove('active', 'game-won');
                        this.keepPlaying = true;
                        this.retryBtn.textContent = 'Try again';
                    } else {
                        this.restart();
                    }
                });

                this.bestScoreEl.textContent = this.bestScore;

                this.setupInput();
                this.restart();
            }

            restart() {
                this.grid = Array(this.size).fill(null).map(() => Array(this.size).fill(null));
                this.score = 0;
                this.won = false;
                this.over = false;
                this.keepPlaying = false;
                this.tiles = {};
                this.tileContainer.innerHTML = '';
                this.messageEl.classList.remove('active', 'game-won');
                this.retryBtn.textContent = 'Try again';
                this.updateScore();

                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            addRandomTile() {
                if (!this.cellsAvailable()) return;

                const availableCells = [];
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (!this.grid[r][c]) {
                            availableCells.push({ r, c });
                        }
                    }
                }

                if (availableCells.length > 0) {
                    const randomCell = availableCells[Math.floor(Math.random() * availableCells.length)];
                    const value = Math.random() < 0.9 ? 2 : 4;
                    const tile = { id: this.tileId++, r: randomCell.r, c: randomCell.c, value: value, isNew: true, isMerged: false };
                    this.grid[randomCell.r][randomCell.c] = tile;
                    this.tiles[tile.id] = tile;
                }
            }

            cellsAvailable() {
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (!this.grid[r][c]) return true;
                    }
                }
                return false;
            }

            setupInput() {
                // Keyboard
                const map = {
                    ArrowUp: 0, ArrowRight: 1, ArrowDown: 2, ArrowLeft: 3,
                    w: 0, d: 1, s: 2, a: 3,
                    W: 0, D: 1, S: 2, A: 3
                };

                document.addEventListener('keydown', (e) => {
                    const modifiers = e.altKey || e.ctrlKey || e.metaKey || e.shiftKey;
                    if (!modifiers && map[e.key] !== undefined) {
                        e.preventDefault();
                        this.move(map[e.key]);
                    }
                });

                // Touch
                let touchStartX = 0;
                let touchStartY = 0;
                const gameContainer = document.getElementById('game-container');

                gameContainer.addEventListener('touchstart', (e) => {
                    if (e.touches.length > 1) return;
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    if (e.cancelable) e.preventDefault();
                }, { passive: false });

                gameContainer.addEventListener('touchmove', (e) => {
                    if (e.cancelable) e.preventDefault();
                }, { passive: false });

                gameContainer.addEventListener('touchend', (e) => {
                    if (e.changedTouches.length === 0) return;

                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;

                    const dx = touchEndX - touchStartX;
                    const dy = touchEndY - touchStartY;

                    const absDx = Math.abs(dx);
                    const absDy = Math.abs(dy);

                    if (Math.max(absDx, absDy) > 30) {
                        if (absDx > absDy) {
                            if (dx > 0) this.move(1); // right
                            else this.move(3); // left
                        } else {
                            if (dy > 0) this.move(2); // down
                            else this.move(0); // up
                        }
                    }
                });
            }

            move(direction) {
                if (this.isAnimating || this.over || (this.won && !this.keepPlaying)) return;

                let moved = false;
                this.isAnimating = true;

                Object.values(this.tiles).forEach(t => {
                    t.isNew = false;
                    t.isMerged = false;
                });

                const vector = this.getVector(direction);
                const traversals = this.buildTraversals(vector);

                traversals.x.forEach((c) => {
                    traversals.y.forEach((r) => {
                        const tile = this.grid[r][c];
                        if (tile) {
                            const positions = this.findFarthestPosition({ r, c }, vector);
                            const next = this.grid[positions.next.r]?.[positions.next.c];

                            if (next && next.value === tile.value && !next.isMerged && !next.deleted) {
                                const mergedRow = positions.next.r;
                                const mergedCol = positions.next.c;
                                const mergedVal = tile.value * 2;

                                const mergedTile = {
                                    id: this.tileId++,
                                    r: mergedRow,
                                    c: mergedCol,
                                    value: mergedVal,
                                    isNew: false,
                                    isMerged: true
                                };

                                tile.r = mergedRow;
                                tile.c = mergedCol;
                                tile.deleted = true;
                                next.deleted = true;

                                this.grid[r][c] = null;
                                this.grid[mergedRow][mergedCol] = mergedTile;
                                this.tiles[mergedTile.id] = mergedTile;

                                this.score += mergedVal;
                                if (mergedVal === 2048) this.won = true;
                                moved = true;
                            } else {
                                const farthest = positions.farthest;
                                if (r !== farthest.r || c !== farthest.c) {
                                    this.grid[r][c] = null;
                                    this.grid[farthest.r][farthest.c] = tile;
                                    tile.r = farthest.r;
                                    tile.c = farthest.c;
                                    moved = true;
                                }
                            }
                        }
                    });
                });

                if (moved) {
                    this.addRandomTile();
                    if (!this.movesAvailable()) this.over = true;
                    this.updateScore();
                    this.render();
                } else {
                    this.isAnimating = false; // unlock if no move generated
                }

                if (moved) {
                    setTimeout(() => {
                        this.isAnimating = false;
                        Object.keys(this.tiles).forEach(id => {
                            if (this.tiles[id].deleted) delete this.tiles[id];
                        });
                        this.render();

                        if (this.over) {
                            this.messageTextEl.textContent = 'Game Over!';
                            this.messageEl.classList.add('active');
                        } else if (this.won && !this.keepPlaying) {
                            this.messageTextEl.textContent = 'You win!';
                            this.messageEl.classList.add('active', 'game-won');
                            this.retryBtn.textContent = 'Keep playing';
                        }
                    }, 150);
                }
            }

            getVector(direction) {
                const map = {
                    0: { r: -1, c: 0 },
                    1: { r: 0, c: 1 },
                    2: { r: 1, c: 0 },
                    3: { r: 0, c: -1 }
                };
                return map[direction];
            }

            buildTraversals(vector) {
                const traversals = { x: [], y: [] };
                for (let pos = 0; pos < this.size; pos++) {
                    traversals.x.push(pos);
                    traversals.y.push(pos);
                }
                if (vector.c === 1) traversals.x.reverse();
                if (vector.r === 1) traversals.y.reverse();
                return traversals;
            }

            findFarthestPosition(cell, vector) {
                let previous;
                let r = cell.r;
                let c = cell.c;

                do {
                    previous = { r, c };
                    r += vector.r;
                    c += vector.c;
                } while (this.withinBounds(r, c) && !this.grid[r][c]);

                return {
                    farthest: previous,
                    next: { r, c }
                };
            }

            withinBounds(r, c) {
                return r >= 0 && r < this.size && c >= 0 && c < this.size;
            }

            movesAvailable() {
                if (this.cellsAvailable()) return true;

                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        const tile = this.grid[r][c];
                        if (tile) {
                            for (let dir = 0; dir < 4; dir++) {
                                const vector = this.getVector(dir);
                                const nextR = r + vector.r;
                                const nextC = c + vector.c;

                                if (this.withinBounds(nextR, nextC)) {
                                    const nextTile = this.grid[nextR][nextC];
                                    if (nextTile && !nextTile.deleted && nextTile.value === tile.value) {
                                        return true;
                                    }
                                }
                            }
                        }
                    }
                }
                return false;
            }

            updateScore() {
                this.scoreEl.textContent = this.score;
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    this.bestScoreEl.textContent = this.bestScore;
                    localStorage.setItem('bestScore2048', this.bestScore);
                }
            }

            render() {
                const isMobile = window.innerWidth <= 500;
                const gap = isMobile ? 10 : 15;
                const gridEl = document.getElementById('grid');

                // fallback if clientWidth is 0 (hidden)
                const containerWidth = gridEl.clientWidth || (isMobile ? window.innerWidth - 40 : 450);
                const tileSize = (containerWidth - (gap * 3)) / 4;

                const currentDOMElements = {};
                Array.from(this.tileContainer.children).forEach(el => {
                    const id = el.getAttribute('data-id');
                    if (id) currentDOMElements[id] = el;
                });

                Object.values(this.tiles).forEach(tile => {
                    const x = tile.c * (tileSize + gap);
                    const y = tile.r * (tileSize + gap);

                    let el = currentDOMElements[tile.id];

                    if (!el) {
                        el = document.createElement('div');
                        el.className = `tile tile-${tile.value >= 4096 ? 'super' : tile.value}`;
                        el.setAttribute('data-id', tile.id);

                        const inner = document.createElement('div');
                        inner.className = 'tile-inner';
                        inner.textContent = tile.value;
                        el.appendChild(inner);

                        this.tileContainer.appendChild(el);

                        el.style.width = `${tileSize}px`;
                        el.style.height = `${tileSize}px`;
                        el.style.transform = `translate(${x}px, ${y}px)`;
                    } else {
                        el.className = `tile tile-${tile.value >= 4096 ? 'super' : tile.value} ${tile.isMerged ? 'merged' : ''}`;
                        el.style.width = `${tileSize}px`;
                        el.style.height = `${tileSize}px`;
                        el.style.transform = `translate(${x}px, ${y}px)`;

                        if (tile.deleted) {
                            el.style.zIndex = '5';
                            el.style.opacity = '0'; // fade out deleted tiles gracefully
                        } else {
                            el.style.zIndex = '10';
                            el.style.opacity = '1';
                        }
                    }

                    delete currentDOMElements[tile.id];
                });

                Object.values(currentDOMElements).forEach(el => {
                    this.tileContainer.removeChild(el);
                });
            }
        }

        let gameManager;
        window.onload = () => {
            // Need a slight delay to ensure CSS has fully applied and layout sizes are complete
            setTimeout(() => {
                gameManager = new GameManager();
            }, 50);

            window.addEventListener('resize', () => {
                if (gameManager) gameManager.render();
            });
        };
    </script>
</body>

</html>
